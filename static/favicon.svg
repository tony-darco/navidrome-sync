<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff4d4d"/>
      <stop offset="50%" stop-color="#e03080"/>
      <stop offset="100%" stop-color="#9b30ff"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="48" height="48" rx="10" fill="url(#bg)"/>
  <!-- Beamed eighth notes — bold, geometric, white -->
  <!-- Left stem -->
  <rect x="10" y="11" width="3.5" height="24" fill="#fff"/>
  <!-- Right stem -->
  <rect x="32" y="7" width="3.5" height="24" fill="#fff"/>
  <!-- Beam connecting stems -->
  <polygon points="10,11 35.5,7 35.5,11 10,15" fill="#fff"/>
  <!-- Left note head -->
  <ellipse cx="12" cy="36" rx="7.5" ry="5.2" transform="rotate(-20 12 36)" fill="#fff"/>
  <!-- Right note head -->
  <ellipse cx="34" cy="32" rx="7.5" ry="5.2" transform="rotate(-20 34 32)" fill="#fff"/>
</svg>